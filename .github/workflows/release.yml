name: Release

on:
  release:
    types: [created]

jobs:
  build_and_upload:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Build MayanMiner executable
        run: powershell -NoProfile -ExecutionPolicy Bypass -File build_exe.ps1

      - name: Install Inno Setup
        run: choco install innosetup --yes

      - name: Build Windows installer
        run: powershell -NoProfile -ExecutionPolicy Bypass -File installer/build_installer.ps1

      - name: Upload release asset - executable
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: output/MayanMiner.exe
          asset_name: MayanMiner.exe
          asset_content_type: application/octet-stream

      - name: Upload release asset - installer
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: output/MayanMinerSetup.exe
          asset_name: MayanMinerSetup.exe
          asset_content_type: application/octet-stream

      - name: Upload release asset - checksum
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: output/MayanMiner.exe.sha256
          asset_name: MayanMiner.exe.sha256
          asset_content_type: text/plain
